DOCKER_HOST=tcp://localhost:2375
# No TLS for the exposed TCP daemon
DOCKER_TLS_VERIFY=0
# Remove local cert/config paths that don't exist in this environment
# DOCKER_CERT_PATH and DOCKER_CONFIG intentionally omitted
# Use a newer Docker API version to match Docker Engine v29+ (min 1.44)
api.version=1.44
registry.url=https://index.docker.io/v1/