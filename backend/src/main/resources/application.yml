spring:
  application:
    name: marketplace
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/marketplace}
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    org.flywaydb: info
